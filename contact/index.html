<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact | Jokare</title>
  <meta name="description" content="Contact Jokare for custom enterprise solutions, technical architecture requests, or support.">
  <link rel="canonical" href="https://jokare.com/contact/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="shortcut icon" href="/images/favicon.png">
  <link rel="icon" type="image/png" href="/images/favicon.png">
  <link rel="apple-touch-icon" href="/images/favicon.png">

  <meta name="theme-color" content="#008080">
  <link rel="stylesheet" href="/style.css">
  <script src="/script.js" defer></script>

  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col">

<div id="header" class="w-full flex-shrink-0"></div>

<main class="flex-1 max-w-2xl w-full mx-auto my-12 p-8 bg-white border border-slate-200 shadow-sm rounded-2xl">
  <div class="mb-8 text-center">
    <h2 class="text-3xl font-black text-slate-900 tracking-tight" data-en="Contact Support & Custom Solutions" data-ja="特注開発・お問い合わせ">Contact Support & Custom Solutions</h2>
    <p class="text-sm text-slate-500 mt-2" data-en="Reach out for system specifications, premium account requests, or tailor-made business tools." data-ja="システムのカスタマイズ、プレミアムプランの相談、各種お問い合わせはこちらから。">Reach out for system specifications.</p>
  </div>

  <form id="contactForm" class="space-y-6">
    <input type="hidden" id="source" name="source">

    <div class="flex flex-col gap-1.5">
      <label class="text-xs font-bold text-slate-500 uppercase tracking-wider" data-en="Name" data-ja="お名前">Name</label>
      <input type="text" name="name" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-teal-600 transition">
    </div>

    <div class="flex flex-col gap-1.5">
      <label class="text-xs font-bold text-slate-500 uppercase tracking-wider" data-en="Email" data-ja="メールアドレス">Email</label>
      <input type="email" name="email" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-teal-600 transition">
    </div>

    <div class="flex flex-col gap-1.5">
      <label class="text-xs font-bold text-slate-500 uppercase tracking-wider" data-en="Message / Technical Requirements" data-ja="メッセージ / 開発要件">Message / Technical Requirements</label>
      <textarea name="message" rows="5" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-teal-600 transition resize-none"></textarea>
    </div>

    <button type="submit" class="w-full bg-teal-700 hover:bg-teal-800 text-white font-bold py-3.5 px-4 rounded-xl transition shadow-md shadow-teal-700/10 text-center text-sm tracking-wide" data-en="Send Message" data-ja="メッセージを送信">
      Send Message
    </button>

    <p id="formFeedback" class="text-center text-sm font-semibold mt-4"></p>
  </form>
</main>

<footer class="bg-slate-900 text-slate-400 text-center py-6 border-t border-slate-800 text-xs font-medium flex-shrink-0">
  © Jokare Workspace
</footer>

</body>
</html>
