  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Jokare",
    "url": "https://jokare.com",
    "logo": "https://jokare.com/images/favicon.png",

  }

  <meta name="theme-color" content="#090d16">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0fdfa',
              500: '#008080',
              600: '#006666',
              950: '#042f2e',
            }
          }
        }
      }
    }
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    
    /* THE BULLETPROOF PRINT ENGINE - SINGLE PAGE EDITION */
    @media print {
      body * { visibility: hidden; }
      
      #invoice-sheet, #invoice-sheet *, #contract-sheet, #contract-sheet * { 
        visibility: visible; 
      }
      
      #invoice-sheet, #contract-sheet { 
        position: absolute; 
        left: 0; 
        top: 0; 
        width: 100% !important; 
        max-width: 100% !important;
        box-shadow: none !important; 
        border: none !important;
        margin: 0 !important;
        background: white !important; 
        color: #0f172a !important;
      }

      #invoice-sheet {
        padding: 3rem !important;
      }

      #contract-sheet {
        padding: 2rem !important; 
        font-size: 13px !important; 
        line-height: 1.6 !important; 
      }
      #contract-sheet h1 { font-size: 20px !important; margin-bottom: 1.5rem !important; text-align: center !important; }
      #contract-sheet h3 { font-size: 14px !important; margin-top: 1.25rem !important; margin-bottom: 0.25rem !important; color: #000000 !important; }
      #contract-sheet p { margin-bottom: 1rem !important; }

      #contract-sheet .grid {
        display: block !important;
        margin-top: 3rem !important;
        padding-top: 1rem !important;
      }
      #contract-sheet .grid > div {
        display: inline-block !important;
        width: 45% !important;
        vertical-align: top !important;
      }
      #contract-sheet .grid > div:last-child {
        float: right !important;
      }
      
      .no-print { display: none !important; }
    }
  </style>
  <script src="/script.js" defer></script>
</head>
