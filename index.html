<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Jokare</title>

  <meta name="description"
        content="Jokare connects Japan and the world through language, culture, and services.">

  <link rel="canonical" href="https://jokare.com/">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Favicon -->
  <link rel="shortcut icon" href="/images/favicon.png">
  <link rel="icon" type="image/png" href="/images/favicon.png">
  <link rel="apple-touch-icon" href="/images/favicon.png">

  <!-- Browser theme colour -->
  <meta name="theme-color" content="#008080">
  
  <link rel="stylesheet" href="/style.css">
  <script src="/script.js" defer></script>
</head>
<body>

<div id="header"></div>

<main class="services-grid">
  <div class="service">
    <img src="/images/language.png" class="service-img" loading="lazy" alt="Language services">
    <h2 data-en="Language" data-ja="語学">Language</h2>
    <a class="cta" href="/language/" data-en="Learn More" data-ja="詳しく見る">Learn More</a>
  </div>

  <div class="service">
    <img src="/images/store.png" class="service-img" loading="lazy" alt="Japanese store">
    <h2 data-en="Store" data-ja="ストア">Store</h2>
    <a class="cta" href="/store/" data-en="Visit Store" data-ja="ストアを見る">Visit Store</a>
  </div>

  <div class="service">
    <img src="/images/rent.png" class="service-img" loading="lazy" alt="Rent services">
    <h2 data-en="Rent" data-ja="レンタル">Rent</h2>
    <a class="cta" href="/rent/" data-en="Hire Now" data-ja="今すぐ依頼">Hire Now</a>
  </div>
</main>

<footer>© Jokare</footer>
</body>
</html>
