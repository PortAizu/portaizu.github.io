<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jokare Hub | Premium Developer & Agency Infrastructure Utilities</title>
  <meta name="description" content="Secure browser-based invoice engines, local workflow planners, and curated corporate application frameworks.">
  <link rel="canonical" href="https://jokare.com/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <link rel="shortcut icon" href="/images/favicon.png">
  <link rel="icon" type="image/png" href="/images/favicon.png">
  <link rel="apple-touch-icon" href="/images/favicon.png">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Jokare",
    "url": "https://jokare.com",
    "logo": "https://jokare.com/images/favicon.png",
    "description": "Premium browser-based business utilities, secure invoice engines, and curated cloud infrastructure software for enterprise teams."
  }
  </script>

  <meta name="theme-color" content="#090d16">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0fdfa',
              500: '#008080',
              600: '#006666',
              950: '#042f2e',
            }
          }
        }
      }
    }
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    
    /* THE CLEAN PRINT ENGINE RESET */
    @media print {
      body * { visibility: hidden; }
      
      #invoice-sheet, #invoice-sheet *, #contract-sheet, #contract-sheet * { 
        visibility: visible; 
      }
      
      #invoice-sheet, #contract-sheet { 
        position: absolute; 
        left: 0; 
        top: 0; 
        width: 100% !important; 
        max-width: 100% !important;
        box-shadow: none !important; 
        border: none !important;
        padding: 2.5rem !important;
        margin: 0 !important;
        background: white !important; 
        color: #0f172a !important;
      }

      /* Tailor the contract layout specifically to fill out letter/A4 paper */
      #contract-sheet {
        font-size: 14px !important;
        line-height: 1.8 !important;
      }
      
      #contract-sheet h1 { 
        font-size: 22px !important; 
        margin-bottom: 2.5rem !important; 
        text-align: center !important;
        letter-spacing: 0.05em !important;
      }
      
      #contract-sheet h3 { 
        font-size: 15px !important; 
        margin-top: 2rem !important; 
        margin-bottom: 0.5rem !important; 
        color: #000000 !important;
      }
      
      #contract-sheet p { 
        margin-bottom: 1.5rem !important; 
        color: #334155 !important;
      }

      /* Fix the signature blocks layout */
      #contract-sheet .grid {
        display: flex !important;
        justify-content: space-between !important;
        gap: 4rem !important;
        margin-top: 4rem !important;
        padding-top: 2rem !important;
      }
      
      #contract-sheet .grid > div {
        flex: 1 !important;
      }
      
      .no-print { display: none !important; }
    }
  </style>
  
  <script src="/script.js" defer></script>
</head>
<body class="bg-[#090d16] text-slate-100 min-h-screen md:h-screen md:overflow-hidden flex flex-col">

  <header class="bg-[#040810]/80 backdrop-blur-md border-b border-slate-800/60 px-4 md:px-6 py-4 flex flex-col sm:flex-row gap-4 justify-between items-center no-print flex-shrink-0">
    <div class="flex items-center gap-3">
      <div class="p-1 bg-brand-500/10 rounded-xl border border-brand-500/20">
        <img src="/images/favicon.png" class="w-8 h-8 object-contain" alt="Jokare logo">
      </div>
      <div class="flex items-center gap-2">
        <h1 class="text-lg font-extrabold tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent" data-en="Jokare" data-ja="ジョカレ">Jokare</h1>
        <span class="text-[9px] font-bold bg-brand-500/10 text-brand-500 border border-brand-500/20 px-1.5 py-0.5 rounded uppercase tracking-wider">Workspace</span>
      </div>
    </div>
    
    <nav class="flex items-center gap-1 bg-slate-900/60 p-1 rounded-xl border border-slate-800/80 w-full sm:w-auto overflow-x-auto justify-center">
      <button onclick="switchWorkspace('invoice')" id="nav-invoice" class="bg-brand-500 text-white font-semibold text-xs px-3 sm:px-4 py-2 rounded-lg transition shadow-md shadow-brand-500/10 whitespace-nowrap" data-en="Invoice Engine" data-ja="請求書作成">Invoice Engine</button>
      <button onclick="switchWorkspace('contract')" id="nav-contract" class="text-slate-400 hover:text-white font-semibold text-xs px-3 sm:px-4 py-2 rounded-lg transition whitespace-nowrap" data-en="NDA Generator" data-ja="契約書作成">NDA Generator</button>
      <button onclick="switchWorkspace('marketplace')" id="nav-marketplace" class="text-slate-400 hover:text-white font-semibold text-xs px-3 sm:px-4 py-2 rounded-lg transition whitespace-nowrap" data-en="Marketplace" data-ja="マーケットプレイス">Marketplace</button>
    </nav>
  </header>

  <main class="flex-1 overflow-y-auto p-4 md:p-6">
    
    <div id="invoice-sheet" class="block max-w-4xl mx-auto bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
      <h2 class="text-xl font-bold mb-4">Invoice Engine</h2>
      <p class="text-slate-400 text-sm">Invoice utility interface elements go here.</p>
    </div>

    <div id="contract-sheet" class="hidden max-w-4xl mx-auto bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
      <h2 class="text-xl font-bold mb-4">NDA Generator</h2>
      <p class="text-slate-400 text-sm">Contract utility interface elements go here.</p>
    </div>

    <div id="marketplace-sheet" class="hidden max-w-4xl mx-auto bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
      <h2 class="text-xl font-bold mb-4">Infrastructure Marketplace</h2>
      <p class="text-slate-400 text-sm">Marketplace curation elements go here.</p>
    </div>

  </main>

</body>
</html>
